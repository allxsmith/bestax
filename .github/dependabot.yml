version: 2
updates:
  # npm ecosystem (also covers pnpm/yarn) — a single root entry covers all
  # workspaces (bulma-ui, docs, create-bestax) because Dependabot reads the root
  # pnpm-lock.yaml and every workspace manifest. There is no separate "pnpm"
  # ecosystem value; pnpm lockfiles are handled under "npm".
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Batch related updates into a few PRs instead of one-per-dependency.
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - javascript

  # GitHub Actions used across the workflows (checkout, setup-node, artifacts,
  # github-script, wrangler). Grouped so action bumps land together.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions
