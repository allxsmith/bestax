name: Claude Deep Review

# One full adversarial Claude review per AI-loop PR, at open. Uses a stronger
# model (opus) than the sonnet implementer to decorrelate blind spots. Its
# inline threads are work items for the fixer in claude-pr-loop.yml; the
# fixer may NOT resolve them — the reviewer re-verifies each claimed fix in
# claude-pr-loop.yml's verify mode and resolves only what is genuinely fixed
# (mirroring CodeRabbit's "✅ Addressed" verification).
#
# Second trigger path: a triage+ collaborator applies the `deep-review`
# label to ANY same-repo PR (any branch) to run the same one-shot review —
# e.g. Claude-Code-authored but human-opened PRs that never enter the loop.
# Security posture: same-repo PRs only (never forks), the labeler's live
# role is re-verified via the collaborators API (triage+ required, so a
# label applied by automation on behalf of an outsider is a silent no-op),
# and the dedupe marker still caps usage at one review per PR ever —
# re-labeling never re-fires it.
#
# Deliberately does NOT trigger on `synchronize`: one review per PR, so
# Claude's own fix pushes can never re-fire this workflow (no reviewer/fixer
# ping-pong, no claude-code-action#1299-style self-trigger failures).

on:
  pull_request:
    types: [opened, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  review:
    # Two ways in, both same-repo PRs only: (a) AI-loop PRs from claude/*
    # branches, or (b) any PR a triage+ user opts in via the `deep-review`
    # label (role re-verified live in the perm step below). For `labeled`
    # events, only the matching label itself may fire the review.
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.state == 'open' &&
      vars.AI_LOOP_ENABLED == 'true' &&
      (
        (
          contains(github.event.pull_request.labels.*.name, 'ai-loop') &&
          startsWith(github.event.pull_request.head.ref, 'claude/') &&
          (github.event.action != 'labeled' || github.event.label.name == 'ai-loop')
        ) ||
        (
          contains(github.event.pull_request.labels.*.name, 'deep-review') &&
          (github.event.action != 'labeled' || github.event.label.name == 'deep-review')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # For the opt-in `deep-review` label only: GitHub already restricts
      # labeling to triage+, but re-verify the labeler's live role
      # defensively (same belt-and-braces pattern as on-slop.yml and
      # claude-implement.yml) so an automated/template label can never spend
      # Claude usage. Every other event shape is the unchanged ai-loop trust
      # model and passes through as allowed.
      - name: Check labeler permission
        id: perm
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SENDER: ${{ github.event.sender.login }}
          ACTION: ${{ github.event.action }}
          LABEL: ${{ github.event.label.name }}
        run: |
          set -euo pipefail
          if [ "$ACTION" != "labeled" ] || [ "$LABEL" != "deep-review" ]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            echo "not a deep-review labeling event — no extra check needed"
            exit 0
          fi
          ROLE=$(gh api "repos/$REPO/collaborators/$SENDER/permission" \
            --jq '.role_name' || echo none)
          case "$ROLE" in
            admin|maintain|write|triage)
              echo "allowed=true" >> "$GITHUB_OUTPUT"
              echo "$SENDER has $ROLE access — running the deep review" ;;
            *)
              echo "allowed=false" >> "$GITHUB_OUTPUT"
              echo "$SENDER lacks triage access ($ROLE) — not running" ;;
          esac

      # `opened` and `labeled` both fire when a PR is created with the label
      # already attached — review exactly once. The concurrency group
      # serializes the double-fire; the marker probe catches the second run.
      # (The marker, not just any claude[bot] activity: the fix agent posts
      # claude[bot] thread replies too, which must not count as "reviewed".)
      #
      # EXCEPTION — deep-review `labeled` events skip the probe: a triage+
      # human re-applying the label (verified live by the perm step above)
      # is an explicit "run a fresh review" request, e.g. after new commits
      # or a prompt upgrade. Usage stays human-metered: one opus session per
      # deliberate label application. The ai-loop path and label-at-creation
      # double-fires keep the one-review invariant.
      - name: Skip if already reviewed
        id: dedupe
        if: steps.perm.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          ACTION: ${{ github.event.action }}
          LABEL: ${{ github.event.label.name }}
        run: |
          set -euo pipefail
          if [ "$ACTION" = "labeled" ] && [ "$LABEL" = "deep-review" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "deep-review label applied by a verified triage+ user — running a fresh review"
            exit 0
          fi
          MARKER=$(gh api "repos/$REPO/pulls/$PR/reviews?per_page=100" --jq \
            '[.[] | select((.user.login | test("^claude(\\[bot\\])?$"))
                           and (.body | contains("<!-- claude-deep-review -->")))] | length')
          if [ "$MARKER" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "deep review already posted on PR #$PR — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR head
        if: steps.perm.outputs.allowed == 'true' && steps.dedupe.outputs.skip == 'false'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        if: steps.perm.outputs.allowed == 'true' && steps.dedupe.outputs.skip == 'false'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        if: steps.perm.outputs.allowed == 'true' && steps.dedupe.outputs.skip == 'false'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.perm.outputs.allowed == 'true' && steps.dedupe.outputs.skip == 'false'
        run: pnpm install --frozen-lockfile

      - name: Run Claude (deep review)
        if: steps.perm.outputs.allowed == 'true' && steps.dedupe.outputs.skip == 'false'
        uses: anthropics/claude-code-action@51c47629174b5dbca955cf93690fd39c8a41dadf # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # On loop PRs the opener/labeler is claude[bot] (the implementer)
          # by design.
          allowed_bots: 'claude'
          claude_args: |
            --max-turns 120
            --model claude-opus-4-8
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh api:*),Bash(pnpm run:*),Bash(pnpm test:*),Bash(pnpm exec:*),Bash(pnpm --filter:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are the independent DEEP REVIEWER for this PR (typically
            AI-authored or AI-assisted). The PR branch is checked out and
            dependencies are installed. You did not write this code — review
            it adversarially.

            1. Read the diff (`gh pr diff`) and the changed files in full.
            2. Verify every candidate finding against the actual code before
               posting it; run the relevant tests (`pnpm --filter <pkg> run
               test`) when unsure. Only post REAL defects:
               - correctness bugs and broken edge cases
               - accessibility problems (aria-*, semantics, focus)
               - public API inconsistencies with the rest of the library
               - missing Storybook story, missing docs page for API changes,
                 missing skills/ update for component/prop changes
               - meaningful coverage gaps in the new code
            3. Do NOT post nitpicks, style, or formatting comments —
               CodeRabbit and the linters cover those.

            FORMAT — your output is read by BOTH the fix agent (which needs
            precise, actionable detail) and a human maintainer (who wants it
            to read cleanly). Use GitHub-flavored Markdown well; NEVER post a
            jumbled wall-of-text paragraph.
            4. Post each defect as an inline comment with
               mcp__github_inline_comment__create_inline_comment
               (confirmed: true). Structure EVERY inline finding as Markdown:
               - A bold one-line title followed by a severity + category tag,
                 e.g. `**Observer ref can be clobbered** — 🟠 Major ·
                 Correctness`. Severity is one of 🔴 Critical / 🟠 Major /
                 🟡 Minor; category is Correctness / Accessibility / API /
                 Coverage / SSR / Performance.
               - **What:** one or two sentences on the actual defect.
               - **Why it matters:** the concrete failure mode or user impact.
               - **Fix:** a ```suggestion block when it is a small local edit,
                 otherwise a fenced diff or code snippet.
               - Put any long trace or reasoning inside a <details> block so
                 the comment stays scannable.
               - Include a ```mermaid diagram when a control-/data-flow picture
                 makes the bug clearer than prose (GitHub renders it).
            5. ALWAYS finish — findings or not — by submitting ONE summary
               review that certifies the deep review ran (for AI-loop PRs,
               the loop's gate requires it before it may hand the PR to a
               human). Write the body to a file first so the Markdown/tables
               survive intact, then post it:

                 (write this to /tmp/deep-review.md, filling in the values)
                 <!-- claude-deep-review -->
                 ## Deep review — <N> finding(s)

                 | # | Severity | Area | Finding | Location |
                 |---|----------|------|---------|----------|
                 | 1 | 🟠 Major | Correctness | <short summary> | `path:line` |

                 **Overall:** <2-3 sentences — is the change sound, what is the
                 riskiest part, and what should the human focus on first.>

                 > 🏄 <one or two sentences in the voice of a laid-back
                 > California surfer summing up the vibe of this PR — fun, but
                 > still accurate about whether it is good to go.>

                 then:
                 gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
                   -f event=COMMENT -F body=@/tmp/deep-review.md

               Keep the literal marker "<!-- claude-deep-review -->" as the
               VERY FIRST line of the body — it is machine-parsed. With zero
               findings, put "No blocking defects found." in the table area and
               still include the Overall line and the surfer blurb.
            6. Never push, merge, close, or label anything, and never write
               "@claude" or "@coderabbitai" in any text.
