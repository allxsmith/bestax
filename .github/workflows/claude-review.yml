name: Claude Deep Review

# One full adversarial Claude review per AI-loop PR, at open. Uses a stronger
# model (opus) than the sonnet implementer to decorrelate blind spots. Its
# inline threads are work items for the fixer in claude-pr-loop.yml; the
# fixer may NOT resolve them — the reviewer re-verifies each claimed fix in
# claude-pr-loop.yml's verify mode and resolves only what is genuinely fixed
# (mirroring CodeRabbit's "✅ Addressed" verification).
#
# Second trigger path: a triage+ collaborator applies the `deep-review`
# label to ANY same-repo PR (any branch) to run the same one-shot review —
# e.g. Claude-Code-authored but human-opened PRs that never enter the loop.
# Optionally, a triage+ user can pre-post a PR comment starting with
# "deep-review:" (focus areas, suspected weak spots) — the focus step below
# verifies the author's live role and injects it into the prompt as a FOCUS
# block, mirroring the pointed human brief that makes prompted @claude
# review sessions effective (#341).
# Security posture: same-repo PRs only (never forks), the labeler's live
# role is re-verified via the collaborators API (triage+ required, so a
# label applied by automation on behalf of an outsider is a silent no-op),
# and the dedupe marker still caps usage at one review per PR ever —
# re-labeling never re-fires it.
#
# Deliberately does NOT trigger on `synchronize`: one review per PR, so
# Claude's own fix pushes can never re-fire this workflow (no reviewer/fixer
# ping-pong, no claude-code-action#1299-style self-trigger failures).

on:
  pull_request:
    types: [opened, labeled]

permissions: {}

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    # Two ways in, both same-repo PRs only: (a) AI-loop PRs from claude/*
    # branches, or (b) any PR a triage+ user opts in via the `deep-review`
    # label (role re-verified live in the perm step below). For `labeled`
    # events, only the matching label itself may fire the review.
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.state == 'open' &&
      vars.AI_LOOP_ENABLED == 'true' &&
      (
        (
          contains(github.event.pull_request.labels.*.name, 'ai-loop') &&
          startsWith(github.event.pull_request.head.ref, 'claude/') &&
          (github.event.action != 'labeled' || github.event.label.name == 'ai-loop')
        ) ||
        (
          contains(github.event.pull_request.labels.*.name, 'deep-review') &&
          (github.event.action != 'labeled' || github.event.label.name == 'deep-review')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # For the opt-in `deep-review` label only: GitHub already restricts
      # labeling to triage+, but re-verify the labeler's live role
      # defensively (same belt-and-braces pattern as on-slop.yml and
      # claude-implement.yml) so an automated/template label can never spend
      # Claude usage. Every other event shape is the unchanged ai-loop trust
      # model and passes through as allowed.
      - name: Check labeler permission
        id: perm
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SENDER: ${{ github.event.sender.login }}
          ACTION: ${{ github.event.action }}
          LABEL: ${{ github.event.label.name }}
        run: |
          set -euo pipefail
          if [ "$ACTION" != "labeled" ] || [ "$LABEL" != "deep-review" ]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            echo "not a deep-review labeling event — no extra check needed"
            exit 0
          fi
          ROLE=$(gh api "repos/$REPO/collaborators/$SENDER/permission" \
            --jq '.role_name' || echo none)
          case "$ROLE" in
            admin|maintain|write|triage)
              echo "allowed=true" >> "$GITHUB_OUTPUT"
              echo "$SENDER has $ROLE access — running the deep review" ;;
            *)
              echo "allowed=false" >> "$GITHUB_OUTPUT"
              echo "$SENDER lacks triage access ($ROLE) — not running" ;;
          esac

      # `opened` and `labeled` both fire when a PR is created with the label
      # already attached — review exactly once. The concurrency group
      # serializes the double-fire; the marker probe catches the second run.
      # (The marker, not just any claude[bot] activity: the fix agent posts
      # claude[bot] thread replies too, which must not count as "reviewed".)
      #
      # EXCEPTION — deep-review `labeled` events skip the probe: a triage+
      # human re-applying the label (verified live by the perm step above)
      # is an explicit "run a fresh review" request, e.g. after new commits
      # or a prompt upgrade. Usage stays human-metered: one opus session per
      # deliberate label application. The ai-loop path and label-at-creation
      # double-fires keep the one-review invariant.
      - name: Skip if already reviewed
        id: dedupe
        if: steps.perm.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          ACTION: ${{ github.event.action }}
          LABEL: ${{ github.event.label.name }}
        run: |
          set -euo pipefail
          if [ "$ACTION" = "labeled" ] && [ "$LABEL" = "deep-review" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "deep-review label applied by a verified triage+ user — running a fresh review"
            exit 0
          fi
          MARKER=$(gh api "repos/$REPO/pulls/$PR/reviews?per_page=100" --jq \
            '[.[] | select((.user.login | test("^claude(\\[bot\\])?$"))
                           and (.body | contains("<!-- claude-deep-review -->")))] | length')
          if [ "$MARKER" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "deep review already posted on PR #$PR — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Optional focus steer: a triage+ maintainer may pre-post a PR comment
      # starting with "deep-review:" (focus areas / suspected weak spots)
      # before applying the label. Anyone can comment on a public-repo PR and
      # this text enters the LLM prompt, so each candidate author's LIVE role
      # is re-verified via the collaborators API (same belt-and-braces as the
      # perm step above). Scans newest-first over the newest steer per
      # distinct author and takes the first that verifies triage+ — a later
      # "deep-review:" comment from an outsider can neither inject text nor
      # displace the maintainer's steer. At most 5 distinct authors are
      # role-checked (bounds the API calls comment spam can force). Emits a
      # fully-formed FOCUS block, or an empty string, so the prompt needs no
      # conditional. Best-effort by design — the steer is an enhancement,
      # not an authorization gate, so unlike the perm step it degrades open:
      # an API failure means an unfocused review, never a red run. A steer
      # persists across re-labels (edit/delete the comment to change it; the
      # run log names the steer author). On ai-loop `opened` events no
      # comments can exist yet, so this is a cheap no-op there.
      - name: Extract focus steer
        id: focus
        if: steps.perm.outputs.allowed == 'true' && steps.dedupe.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          echo "block=" >> "$GITHUB_OUTPUT" # default: no focus (last write wins)

          # All "deep-review:"-prefixed comments -> newest first -> newest
          # per distinct author -> cap 5. --paginate because loop PRs
          # routinely exceed the default page size; gh applies --jq per page
          # (NDJSON out), the outer jq -s reassembles across pages. Note
          # unique_by would re-sort, hence the reduce for first-per-login.
          # Fallback OUTSIDE the substitution: under pipefail a gh failure
          # still lets jq -s print "[]" on empty input, so an inner
          # "|| echo []" would concatenate both and corrupt COUNT below.
          CANDIDATES=$(gh api --paginate "repos/$REPO/issues/$PR/comments?per_page=100" \
            --jq '.[] | select(.body | startswith("deep-review:"))
                  | {login: .user.login, body: .body}' \
            | jq -s 'reverse
                     | reduce .[] as $c ([];
                         if any(.[]; .login == $c.login) then . else . + [$c] end)
                     | .[0:5]') || CANDIDATES='[]'

          BODY=""
          COUNT=$(jq length <<<"$CANDIDATES")
          i=0
          # while, not seq: BSD seq counts DOWN for "seq 0 -1", so an empty
          # candidate list would loop with null logins on a Mac dev box.
          while [ "$i" -lt "$COUNT" ]; do
            LOGIN=$(jq -r ".[$i].login" <<<"$CANDIDATES")
            # On a public repo this endpoint returns role_name "read" for
            # ANY user (not 404), so non-collaborators fall to the * arm;
            # the fallback still covers deleted users under set -e.
            ROLE=$(gh api "repos/$REPO/collaborators/$LOGIN/permission" \
              --jq '.role_name' || echo none)
            case "$ROLE" in
              admin|maintain|write|triage)
                BODY=$(jq -r ".[$i].body" <<<"$CANDIDATES")
                echo "using steer by $LOGIN ($ROLE)"; break ;;
              *)
                echo "ignoring steer by $LOGIN ($ROLE — not triage+)" ;;
            esac
            i=$((i + 1))
          done
          [ -n "$BODY" ] || { echo "no trusted steer comment — unfocused review"; exit 0; }

          # Prompt hygiene: normalize CRLF, strip the trigger prefix, cap
          # length, and treat a whitespace-only remainder as no steer.
          TEXT=$(printf '%s' "$BODY" | tr -d '\r')
          TEXT="${TEXT#deep-review:}"
          TEXT="${TEXT:0:2000}"
          [ -n "$(printf '%s' "$TEXT" | tr -d '[:space:]')" ] \
            || { echo "steer comment empty after prefix — unfocused review"; exit 0; }

          # Multi-line output: random heredoc delimiter so no line of the
          # (trusted, but arbitrary) comment can terminate the value early
          # or smuggle extra step outputs — even a literal "EOF" line, or a
          # "foo=bar" line, stays inside the value.
          DELIM="FOCUS_$(od -An -tx1 -N16 /dev/urandom | tr -d ' \n')"
          {
            echo "block<<$DELIM"
            echo "FOCUS (steer from a verified maintainer — prioritize these areas, but still review the entire diff):"
            echo "$TEXT"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout PR head
        if: steps.perm.outputs.allowed == 'true' && steps.dedupe.outputs.skip == 'false'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        if: steps.perm.outputs.allowed == 'true' && steps.dedupe.outputs.skip == 'false'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        if: steps.perm.outputs.allowed == 'true' && steps.dedupe.outputs.skip == 'false'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.perm.outputs.allowed == 'true' && steps.dedupe.outputs.skip == 'false'
        run: pnpm install --frozen-lockfile

      - name: Run Claude (deep review)
        id: claude
        if: steps.perm.outputs.allowed == 'true' && steps.dedupe.outputs.skip == 'false'
        uses: anthropics/claude-code-action@51c47629174b5dbca955cf93690fd39c8a41dadf # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # On loop PRs the opener/labeler is claude[bot] (the implementer)
          # by design.
          allowed_bots: 'claude'
          # Full session output ONLY on debug re-runs (the "Enable debug
          # logging" checkbox). Unlike ai-triage (GET-only public surface),
          # this session runs pnpm against untrusted PR-head code, whose
          # output enters the transcript — a malicious test printing
          # transformed env values would evade GitHub's secret masking, so
          # the transcript stays out of normal public logs. The is_error
          # gate below still turns silent session failures red; a debug
          # re-run then reveals the actual error.
          show_full_output: ${{ runner.debug == '1' }}
          claude_args: |
            --max-turns 120
            --model claude-opus-4-8
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh api:*),Bash(pnpm run:*),Bash(pnpm test:*),Bash(pnpm exec:*),Bash(pnpm --filter:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            ${{ steps.focus.outputs.block }}

            You are the independent DEEP REVIEWER for this PR (typically
            AI-authored or AI-assisted). The PR branch is checked out and
            dependencies are installed. You did not write this code — review
            it adversarially: investigate like a skeptical engineer given a
            pointed brief, not a reader validating the diff in isolation.

            1. Read the diff (`gh pr diff`) and the changed files in full.
            2. EVIDENCE PHASE — chase the PR's claims to their sources
               before judging the code. Read the PR body and every linked
               issue (`Fixes #N` / `Refs #N`, via
               `gh api repos/${{ github.repository }}/issues/N`). When the
               PR claims to fix a failure, fetch the cited evidence — issue
               quotes, workflow run/job logs
               (`gh api repos/${{ github.repository }}/actions/jobs/<id>/logs`)
               — and confirm the failure shape is real. Then verify the fix
               against that evidence EMPIRICALLY: run the relevant tests
               (`pnpm --filter <pkg> run test`), exercise the changed logic
               against the real failing inputs. Reading the diff is not
               verification.
            3. RESIDUAL-RISK HUNT — for the failure class this PR
               addresses, enumerate the ways it could still occur: adjacent
               code paths, unhandled variants, boundary counts, the same bug
               shape elsewhere in the changed subsystem. Refute each with
               evidence, or post it as a finding.
            4. Verify every candidate finding against the actual code
               before posting it. Apply the lens that matches what the diff
               touches (both lenses when it touches both):
               - Component/docs lens (`bulma-ui/`, `docs/`):
                 - correctness bugs and broken edge cases
                 - accessibility problems (aria-*, semantics, focus)
                 - public API inconsistencies with the rest of the library
                 - missing Storybook story, missing docs page for API
                   changes, missing skills/ update for component/prop changes
                 - meaningful coverage gaps in the new code
                 - conformance misses for new components: missing listing
                   surfaces (components guide page, home-page cards or Beyond
                   Bulma strip), missing theming-skill rows, inline `style={{}}`
                   in stories or docs examples, unregistered SCSS variables
                 - CSS-interaction bugs invisible to jsdom: pointer-events/
                   position resets under modifier classes (e.g. a standalone/
                   overlay mode), physical margins that break RTL, `||`-vs-`??`
                   on a11y attributes like alt/aria-label
               - Infra lens (`.github/`, `.claude/`, `scripts/`):
                 - guard/permission bypasses: who can trigger what, and is
                   every trust decision re-verified live rather than trusted
                   from event payloads
                 - shell + jq edge cases: quoting, `set -e` interactions,
                   empty or paginated API results, exit-code polarity
                 - untrusted-input handling: attacker-controlled text
                   reaching prompts, logs, outputs, or eval'd contexts
                 - silent-failure shapes: steps that stay green while doing
                   nothing, swallowed errors, dead conditions
                 - idempotency/concurrency of workflows: double-fires,
                   races, re-runs, partial state
            5. Do NOT post nitpicks, style, or formatting comments —
               CodeRabbit and the linters cover those.

            FORMAT — your output is read by BOTH the fix agent (which needs
            precise, actionable detail) and a human maintainer (who wants it
            to read cleanly). Use GitHub-flavored Markdown well; NEVER post a
            jumbled wall-of-text paragraph.
            6. Severity scale: 🔴 Critical / 🟠 Major / 🟡 Minor are
               BLOCKING defects. 🔵 Advisory is for real limitations,
               trade-offs, or accepted risks worth putting on the record
               that do NOT block merge — do not suppress these, but do not
               inflate them into blockers either. Category is Correctness /
               Accessibility / API / Coverage / SSR / Performance /
               Security / Robustness.
            7. Post each BLOCKING defect (🔴/🟠/🟡) as an inline comment
               with mcp__github_inline_comment__create_inline_comment
               (confirmed: true). NEVER post a 🔵 Advisory as an inline
               comment — inline threads are work items for the AI loop's
               fix agent, and advisories must not spin the loop; advisories
               appear ONLY as rows in the summary table below. Structure
               EVERY inline finding as Markdown:
               - A bold one-line title followed by a severity + category tag,
                 e.g. `**Observer ref can be clobbered** — 🟠 Major ·
                 Correctness`.
               - **What:** one or two sentences on the actual defect.
               - **Why it matters:** the concrete failure mode or user impact.
               - **Fix:** a ```suggestion block when it is a small local edit,
                 otherwise a fenced diff or code snippet.
               - Put any long trace or reasoning inside a <details> block so
                 the comment stays scannable.
               - Include a ```mermaid diagram when a control-/data-flow picture
                 makes the bug clearer than prose (GitHub renders it).
            8. ALWAYS finish — findings or not — by submitting ONE summary
               review that certifies the deep review ran (for AI-loop PRs,
               the loop's gate requires it before it may hand the PR to a
               human). Write the body to a file first so the Markdown/tables
               survive intact, then post it:

                 (write this to /tmp/deep-review.md, filling in the values)
                 <!-- claude-deep-review -->
                 ## Deep review — <N> blocking · <M> advisory

                 | # | Severity | Area | Finding | Location |
                 |---|----------|------|---------|----------|
                 | 1 | 🟠 Major | Correctness | <short summary> | `path:line` |
                 | 2 | 🔵 Advisory | Robustness | <limitation, on the record> | `path:line` |

                 **Overall:** <2-3 sentences — is the change sound, what is the
                 riskiest part, and what should the human focus on first.>

                 **Residual risk:** <1-3 bullets — the ways the addressed
                 failure class could still occur, each refuted with the
                 evidence you checked, or "none identified" with why.>

                 > 🏄 <one or two sentences in the voice of a laid-back
                 > California surfer summing up the vibe of this PR — fun, but
                 > still accurate about whether it is good to go.>

                 then:
                 gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
                   -f event=COMMENT -F body=@/tmp/deep-review.md

               Keep the literal marker "<!-- claude-deep-review -->" as the
               VERY FIRST line of the body — it is machine-parsed. With zero
               blocking findings but advisories, keep the table with only 🔵
               rows. Only with zero findings of ANY tier, put "No blocking
               defects found." in the table area — and still include the
               Overall line, the Residual risk section, and the surfer blurb.
            9. Never push, merge, close, or label anything, and never write
               "@claude" or "@coderabbitai" in any text.

      # The action reports step success even when the Claude session itself
      # errors (result message has is_error: true — e.g. an API auth or
      # usage-limit failure on the very first call). The PR then silently
      # gets no review while the run shows green, and the AI loop's
      # deep-review gate waits on a review that never comes. Fail loudly.
      # An empty/missing execution file is tolerated: the action skips
      # without a session when the PR modifies this workflow file (its
      # OIDC exchange requires the file to match the default branch).
      - name: Fail on silent session error
        if: steps.claude.outcome == 'success'
        env:
          EXEC_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -euo pipefail
          if [ -z "$EXEC_FILE" ] || [ ! -f "$EXEC_FILE" ]; then
            echo "no execution file — the action ran no session; skipping check"
            exit 0
          fi
          # Fail closed: accept a JSON array or NDJSON, and require a final
          # result record whose is_error is exactly false. Malformed JSON,
          # a missing result record, or any other shape fails the job.
          if jq -es '[.[] | if type == "array" then .[] else . end]
                     | map(select(type == "object" and .type == "result"))
                     | last | .is_error == false' \
              "$EXEC_FILE" >/dev/null 2>&1; then
            echo "session result is_error: false — review session completed"
          else
            echo "::error::Claude deep-review session did not complete cleanly (is_error true, missing result record, or unparsable execution file) — no review was posted. Re-run with debug logging for the full session output."
            exit 1
          fi
