name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Read-only by default: the test jobs execute PR-authored code (pnpm install,
# tests, builds) — including AI-pushed claude/* branches — so the token they
# can reach must not be able to write. The publish job re-declares the write
# scopes semantic-release needs.
permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          # This job runs PR code; don't leave the token in .git/config.
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fast, source-only check (no build deps) — fail early if the generated
      # skill catalog is stale.
      - name: Component catalog up to date
        run: pnpm run gen:catalog:check

      # House-convention gates (listings, docs sections, SCSS pattern,
      # stories, inline-style ratchet). Error messages name the file and fix.
      - name: Conformance checks
        run: pnpm run check:conformance

      - name: Build
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Test Coverage
        run: pnpm run test:coverage

      - name: Bundle Stats
        run: pnpm run bundle:stats

      - name: Lint
        run: pnpm run lint

      - name: Format Check
        run: pnpm run format:check

      - name: Audit (high severity)
        run: pnpm audit --audit-level=high

      # Always build: the smoke pass below needs the static build, and the old
      # changed-files condition never matched on PRs (changed_files is an
      # integer count, not a path list).
      - name: Build Storybook (bulma-ui)
        run: pnpm --filter @allxsmith/bestax-bulma run build-storybook

      - name: Install Playwright Chromium
        run: pnpm --filter @allxsmith/bestax-bulma exec playwright install --with-deps chromium

      # Smoke gate (#283): every story renders without errors and without
      # console errors, once in light and once with data-theme="dark" —
      # dark-mode-only CSS bugs are invisible to jsdom, so this is the only
      # automated coverage for that defect class. Not visual regression
      # (no screenshot baselines); see visual-regression.yml for that.
      - name: Storybook smoke test (light + dark)
        run: pnpm --filter @allxsmith/bestax-bulma run test-storybook:ci

      - name: Archive Coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: |
            bulma-ui/coverage
            create-bestax/coverage
          retention-days: 7

      - name: Archive Bundle Stats
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bundle-stats
          path: |
            bulma-ui/dist/stats.html
            docs/build/stats.html
          retention-days: 7

      - name: Archive Storybook
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: storybook
          path: bulma-ui/storybook-static

  react-compat:
    # bestax-bulma supports React 18 and 19 (see peerDependencies). Build,
    # typecheck and test the library against both majors so a change that
    # depends on a React-19-only API (or breaks React 18) fails CI.
    name: React ${{ matrix.react }} compatibility
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        react: ['18', '19']

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # This job runs PR code; don't leave the token in .git/config.
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'pnpm'

      # Pin react/react-dom consistently across all workspaces, then a plain
      # (non-frozen) install re-resolves the tree for the requested React major.
      - name: Pin React ${{ matrix.react }}
        run: node .github/scripts/pin-react.mjs ${{ matrix.react }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify installed React major
        run: node -e "console.log('react', require('react/package.json').version)"

      - name: Build bulma-ui
        run: pnpm --filter @allxsmith/bestax-bulma run build

      - name: Typecheck bulma-ui
        run: pnpm --filter @allxsmith/bestax-bulma run typecheck

      - name: Test bulma-ui
        run: pnpm --filter @allxsmith/bestax-bulma run test

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # OIDC trusted publishing needs id-token: write to mint the short-lived
    # token npm exchanges with the registry. The remaining scopes are what
    # @semantic-release/git and @semantic-release/github require to push the
    # release commit/tag and create the GitHub release.
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # semantic-release publishes via @semantic-release/npm, which shells out
      # to `npm publish`. OIDC trusted publishing requires npm >= 11.5.1, so
      # pin a known-good npm even though dependencies are managed by pnpm.
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Import GPG key
        env:
          GIT_USER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
          GIT_USER_NAME: ${{ secrets.GIT_USER_NAME }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --yes --import
          echo "$GPG_KEY_ID:6:" | gpg --import-ownertrust
          git config --global user.email "$GIT_USER_EMAIL"
          git config --global user.name "$GIT_USER_NAME"
          git config --global user.signingkey "$GPG_KEY_ID"
          git config --global commit.gpgsign true
          git config --global gpg.program gpg

      # No NPM_TOKEN: publishing authenticates via OIDC trusted publishing.
      # A present NPM_TOKEN takes precedence over OIDC and reintroduces the
      # EOTP (one-time password) failure on 2FA-protected accounts.
      - name: Semantic Release (bulma-ui)
        working-directory: bulma-ui
        env:
          GIT_COMMITTER_EMAIL: ${{ secrets.GIT_COMMITTER_EMAIL }}
          GIT_COMMITTER_NAME: ${{ secrets.GIT_COMMITTER_NAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git log -1 --show-signature
          pnpm exec semantic-release

      - name: Semantic Release (create-bestax)
        working-directory: create-bestax
        env:
          GIT_COMMITTER_EMAIL: ${{ secrets.GIT_COMMITTER_EMAIL }}
          GIT_COMMITTER_NAME: ${{ secrets.GIT_COMMITTER_NAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git log -1 --show-signature
          pnpm exec semantic-release
