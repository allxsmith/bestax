name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Test Coverage
        run: npm run test:coverage

      - name: Bundle Stats
        run: npm run bundle:stats

      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format

      - name: Format Check
        run: npm run format:check

      - name: Build Storybook (bulma-ui)
        if: github.event_name == 'push' || contains(github.event.pull_request.changed_files, 'bulma-ui/**')
        run: npm run build-storybook -w bulma-ui

      - name: Archive Coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: |
            bulma-ui/coverage
            create-bestax/coverage
          retention-days: 7

      - name: Archive Bundle Stats
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bundle-stats
          path: |
            bulma-ui/dist/stats.html
            docs/build/stats.html
          retention-days: 7

      - name: Archive Storybook
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: storybook
          path: bulma-ui/storybook-static

  react-compat:
    # bestax-bulma supports React 18 and 19 (see peerDependencies). Build,
    # typecheck and test the library against both majors so a change that
    # depends on a React-19-only API (or breaks React 18) fails CI.
    name: React ${{ matrix.react }} compatibility
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        react: ['18', '19']

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      # Pin react/react-dom consistently across all workspaces, then a plain
      # `npm install` (no --legacy-peer-deps, so peer deps like
      # @testing-library/dom are still installed) resolves a clean tree.
      - name: Pin React ${{ matrix.react }}
        run: node .github/scripts/pin-react.mjs ${{ matrix.react }}

      - name: Install dependencies
        run: npm install

      - name: Verify installed React major
        run: node -e "console.log('react', require('react/package.json').version)"

      - name: Build bulma-ui
        run: npm run build -w @allxsmith/bestax-bulma

      - name: Typecheck bulma-ui
        run: npm run typecheck -w @allxsmith/bestax-bulma

      - name: Test bulma-ui
        run: npm run test -w @allxsmith/bestax-bulma

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # OIDC trusted publishing needs id-token: write to mint the short-lived
    # token npm exchanges with the registry. The remaining scopes are what
    # @semantic-release/git and @semantic-release/github require to push the
    # release commit/tag and create the GitHub release.
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing requires npm >= 11.5.1. Node 24 may ship an
      # older npm, so pin a known-good version that supports OIDC.
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Import GPG key
        env:
          GIT_USER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
          GIT_USER_NAME: ${{ secrets.GIT_USER_NAME }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --yes --import
          echo "$GPG_KEY_ID:6:" | gpg --import-ownertrust
          git config --global user.email "$GIT_USER_EMAIL"
          git config --global user.name "$GIT_USER_NAME"
          git config --global user.signingkey "$GPG_KEY_ID"
          git config --global commit.gpgsign true
          git config --global gpg.program gpg

      # No NPM_TOKEN: publishing authenticates via OIDC trusted publishing.
      # A present NPM_TOKEN takes precedence over OIDC and reintroduces the
      # EOTP (one-time password) failure on 2FA-protected accounts.
      - name: Semantic Release (bulma-ui)
        working-directory: bulma-ui
        env:
          GIT_COMMITTER_EMAIL: ${{ secrets.GIT_COMMITTER_EMAIL }}
          GIT_COMMITTER_NAME: ${{ secrets.GIT_COMMITTER_NAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git log -1 --show-signature
          npx semantic-release

      - name: Semantic Release (create-bestax)
        working-directory: create-bestax
        env:
          GIT_COMMITTER_EMAIL: ${{ secrets.GIT_COMMITTER_EMAIL }}
          GIT_COMMITTER_NAME: ${{ secrets.GIT_COMMITTER_NAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git log -1 --show-signature
          npx semantic-release
