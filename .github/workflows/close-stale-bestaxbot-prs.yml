name: Close Stale Claude-Assisted PRs

# Closes Claude-assisted PRs (bestaxbot-authored or labeled
# `claude-assisted`) untouched for 90 days. Mirrors oven-sh/bun's
# close-stale-robobun-prs.yml. Zero Claude usage — plain shell + gh, so it
# can never spend AI budget or act on untrusted content.
#
# This is the ONLY closer for these PRs: stale.yml exempts the
# `claude-assisted` label from its generic 30/14-day sweep, so AI-assisted
# PRs get the longer leash (they routinely sit waiting on human review).
# The sweep is the union of author:bestaxbot and label:claude-assisted —
# the label (auto-applied by auto-label-claude-prs.yml) also covers
# human-authored PRs with Claude attribution, and the author query covers
# bot PRs opened before the labeler existed.
#
# PRs labeled `neverstale` are exempt from this closer too — the label means
# "exempt from stale automation", and that covers the 90-day sweep as well
# as the generic 30/14-day stale.yml layer.
#
# Loop labels (ai-loop / ai-loop-paused / needs-human-review) are stripped
# BEFORE the close (same pattern as on-slop.yml) so the PR exits the AI
# loop's state machine cleanly instead of lingering as a closed-but-labeled
# zombie the watchdog might still try to sweep.

on:
  schedule:
    # 03:41 UTC daily — deliberately offset from the loop watchdog's
    # `23 */2 * * *` so the closer never races a sweep re-dispatch.
    - cron: '41 3 * * *'
  workflow_dispatch:

# No workflow-level grants; the single job takes exactly what it needs.
permissions: {}

jobs:
  close:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write # comment, edit labels, close
      issues: write # issue-comment API for the PR conversation
    steps:
      - name: Close Claude-assisted PRs inactive for 90+ days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          CUTOFF=$(date -u -d '90 days ago' +%Y-%m-%dT%H:%M:%SZ)
          echo "Closing Claude-assisted PRs not updated since $CUTOFF"

          # Union of the two selectors, deduped by PR number. A label with
          # no matches (or that doesn't exist yet) yields an empty list from
          # `gh pr list`, not an error.
          {
            gh pr list --repo "$REPO" --author bestaxbot --state open \
              --json number,updatedAt,labels
            gh pr list --repo "$REPO" --label claude-assisted --state open \
              --json number,updatedAt,labels
          } \
          | jq -rs --arg cutoff "$CUTOFF" \
              'add | unique_by(.number) | .[] | select(.updatedAt < $cutoff) | select(([.labels[].name] | index("neverstale")) | not) | .number' \
          | while read -r PR; do
              echo "Closing stale PR #$PR"
              gh pr comment "$PR" --repo "$REPO" --body "Closing this PR after 90 days of inactivity. If it's still wanted, reopen it — for AI-loop PRs, you can instead restart the loop per the instructions in the PR's \`ai-loop-state\` status comment."

              # Strip loop labels FIRST so the PR leaves the loop's state
              # machine cleanly; ignore any that are not present.
              gh pr edit "$PR" --repo "$REPO" \
                --remove-label ai-loop \
                --remove-label ai-loop-paused \
                --remove-label needs-human-review || true

              gh pr close "$PR" --repo "$REPO"
            done
