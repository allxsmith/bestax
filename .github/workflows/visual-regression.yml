name: Visual Regression Testing

on:
  # Daily schedule at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'

  # Manual trigger with option to update baseline screenshots
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Update baseline screenshots'
        required: false
        type: boolean
        default: false

  # Optional: Run on PRs that modify create-bestax
  pull_request:
    paths:
      - 'create-bestax/**'
      - '.github/workflows/visual-regression.yml'

# Read-only by default: the matrix job executes PR-controlled code, and the
# scaffolded-app installs run with --ignore-workspace — i.e. OUTSIDE
# pnpm-workspace.yaml's supply-chain hardening (blocked install scripts,
# minimumReleaseAge) — so the token in reach must not be able to write. Only
# the workflow_dispatch-gated commit job below gets contents: write.
permissions:
  contents: read

jobs:
  visual-regression:
    name: Test ${{ matrix.scenario.template }}-${{ matrix.scenario.bulma }}-${{ matrix.scenario.icon }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        scenario:
          # Core: vite × Bulma flavors (no icons)
          - { template: vite, bulma: complete, icon: none }
          - { template: vite, bulma: prefixed, icon: none }
          - { template: vite, bulma: no-helpers, icon: none }

          # Core: vite-ts × Bulma flavors (no icons)
          - { template: vite-ts, bulma: complete, icon: none }
          - { template: vite-ts, bulma: prefixed, icon: none }
          - { template: vite-ts, bulma: no-helpers, icon: none }

          # Icon libraries: Essential icons only
          - { template: vite, bulma: complete, icon: fontawesome }
          - { template: vite, bulma: complete, icon: mdi }
          - { template: vite-ts, bulma: complete, icon: fontawesome }
          - { template: vite-ts, bulma: complete, icon: mdi }

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          # This job runs PR-controlled code; don't leave the token in
          # .git/config.
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '24'
          cache: 'pnpm' # Cache enabled for create-bestax CLI installation

      - name: Install dependencies
        # Root install covers every workspace (incl. create-bestax dev deps),
        # so no separate create-bestax install is needed.
        run: pnpm install --frozen-lockfile

      - name: Build create-bestax CLI
        run: pnpm --filter create-bestax run build

      - name: Install Playwright browsers
        working-directory: create-bestax
        run: pnpm exec playwright install --with-deps chromium

      - name: Create test directory
        run: mkdir -p test-apps

      - name: Scaffold test app
        working-directory: test-apps
        run: |
          node ../create-bestax/dist/index.js \
            test-app-${{ matrix.scenario.template }}-${{ matrix.scenario.bulma }}-${{ matrix.scenario.icon }} \
            -t ${{ matrix.scenario.template }} \
            -b ${{ matrix.scenario.bulma }} \
            -i ${{ matrix.scenario.icon }} \
            -y

      # The scaffolded app lives inside the repo, so pnpm would otherwise treat
      # it as part of the root workspace. --ignore-workspace installs/builds it
      # standalone (like a real user's fresh app).
      - name: Install app dependencies
        working-directory: test-apps/test-app-${{ matrix.scenario.template }}-${{ matrix.scenario.bulma }}-${{ matrix.scenario.icon }}
        run: pnpm install --ignore-workspace --prefer-offline=false

      - name: Build scaffolded app
        working-directory: test-apps/test-app-${{ matrix.scenario.template }}-${{ matrix.scenario.bulma }}-${{ matrix.scenario.icon }}
        run: pnpm --ignore-workspace run build

      - name: Start Vite preview server
        working-directory: test-apps/test-app-${{ matrix.scenario.template }}-${{ matrix.scenario.bulma }}-${{ matrix.scenario.icon }}
        run: |
          pnpm --ignore-workspace run preview &
          echo $! > server.pid
          # Wait for server to be ready
          pnpm dlx wait-on http://localhost:4173 --timeout 60000

      - name: Run Playwright tests
        working-directory: create-bestax
        run: |
          if [ "${{ inputs.update_snapshots }}" = "true" ]; then
            pnpm run test:e2e:update -- --project=chromium
          else
            pnpm run test:e2e -- --project=chromium
          fi
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
          TEST_SCENARIO: ${{ matrix.scenario.template }}-${{ matrix.scenario.bulma }}-${{ matrix.scenario.icon }}

      - name: Stop Vite server
        if: always()
        working-directory: test-apps/test-app-${{ matrix.scenario.template }}-${{ matrix.scenario.bulma }}-${{ matrix.scenario.icon }}
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results-${{ matrix.scenario.template }}-${{ matrix.scenario.bulma }}-${{ matrix.scenario.icon }}
          path: create-bestax/e2e/test-results/
          retention-days: 7

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-${{ matrix.scenario.template }}-${{ matrix.scenario.bulma }}-${{ matrix.scenario.icon }}
          path: create-bestax/e2e/playwright-report/
          retention-days: 7

      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: visual-diffs-${{ matrix.scenario.template }}-${{ matrix.scenario.bulma }}-${{ matrix.scenario.icon }}
          path: |
            create-bestax/e2e/test-results/**/*-diff.png
            create-bestax/e2e/test-results/**/*-actual.png
            create-bestax/e2e/test-results/**/*-expected.png
          retention-days: 7

      - name: Upload updated screenshots
        if: inputs.update_snapshots && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: screenshots-${{ matrix.scenario.template }}-${{ matrix.scenario.bulma }}-${{ matrix.scenario.icon }}
          path: create-bestax/e2e/tests/app.spec.ts-snapshots/${{ matrix.scenario.template }}-${{ matrix.scenario.bulma }}-${{ matrix.scenario.icon }}/
          retention-days: 1

  commit-screenshots:
    name: Commit Updated Screenshots
    runs-on: ubuntu-latest
    needs: visual-regression
    if: inputs.update_snapshots && github.event_name == 'workflow_dispatch'
    permissions:
      # verified-commit pushes the updated baselines via the git data API.
      # workflow_dispatch-only (never reachable from a pull_request event).
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Download all screenshot artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: screenshots-*
          path: downloaded-screenshots

      - name: Copy screenshots to repository
        run: |
          # Copy scenario-specific screenshots, preserving directory structure
          for scenario_dir in downloaded-screenshots/screenshots-*; do
            if [ -d "$scenario_dir" ]; then
              scenario_name=$(basename "$scenario_dir" | sed 's/screenshots-//')
              mkdir -p "create-bestax/e2e/tests/app.spec.ts-snapshots/$scenario_name"
              cp -r "$scenario_dir"/*.png "create-bestax/e2e/tests/app.spec.ts-snapshots/$scenario_name/" 2>/dev/null || true
            fi
          done

      - name: Commit screenshots via GitHub API (verified)
        uses: ./.github/actions/verified-commit
        with:
          file-pattern: 'create-bestax/e2e/tests/**/*.png'
          message: 'chore(e2e): update baseline screenshots [skip ci]'
          token: ${{ secrets.GITHUB_TOKEN }}

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: visual-regression
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.visual-regression.result }}" = "failure" ]; then
            echo "❌ Some visual regression tests failed"
            echo "Check the uploaded artifacts for details"
            exit 1
          else
            echo "✅ All visual regression tests passed"
          fi

      - name: Report statistics
        run: |
          echo "## Visual Regression Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎯 Total test scenarios: 10" >> $GITHUB_STEP_SUMMARY
          echo "📦 Fresh pnpm installs: ~10 apps per run" >> $GITHUB_STEP_SUMMARY
          echo "✅ Status: ${{ needs.visual-regression.result }}" >> $GITHUB_STEP_SUMMARY
