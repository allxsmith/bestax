name: Claude

# Interactive assistant: responds when a trusted user writes "@claude" in an
# issue, a PR, or a review comment. Claude can answer, implement fixes, and
# open follow-up PRs.
#
# USAGE PROTECTION: the job-level `if:` below is the primary guard against
# strangers on this public repo spending your Claude usage. It only runs when
# the triggering user is the repo OWNER, an org MEMBER, or an invited
# COLLABORATOR. See CLAUDE.md and .github (Settings > Actions) for the other
# layers (outside-contributor approval, per-run turn cap, account limits).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

permissions: {}

jobs:
  claude:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    # Only OWNER / MEMBER / COLLABORATOR may trigger Claude, and only when the
    # relevant body actually contains the "@claude" trigger phrase. Anyone else
    # mentioning @claude is a no-op — the job never starts, so no usage is spent.
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Layer 2 (authoritative): author_association can be COLLABORATOR with
      # only read access. Re-check the LIVE role and require write/triage+.
      - name: Check trigger permission
        id: perm
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          set -euo pipefail
          ROLE=$(gh api "repos/$REPO/collaborators/$SENDER/permission" \
            --jq '.role_name' || echo none)
          case "$ROLE" in
            admin|maintain|write|triage)
              echo "allowed=true" >> "$GITHUB_OUTPUT"
              echo "$SENDER has $ROLE access — responding" ;;
            *)
              echo "allowed=false" >> "$GITHUB_OUTPUT"
              echo "$SENDER lacks write/triage access ($ROLE) — ignoring" ;;
          esac

      - name: Checkout code
        if: steps.perm.outputs.allowed == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      # Pre-provision the toolchain so @claude can run tests/lint/build without
      # burning turns bootstrapping the environment.
      - name: Setup pnpm
        if: steps.perm.outputs.allowed == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        if: steps.perm.outputs.allowed == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Run Claude
        if: steps.perm.outputs.allowed == 'true'
        uses: anthropics/claude-code-action@51c47629174b5dbca955cf93690fd39c8a41dadf # v1
        with:
          # OAuth token from a Claude Pro/Max subscription (flat cost, no
          # per-token dollar billing). Generate with `claude setup-token` and
          # store as a repo secret. If you switch to pay-as-you-go instead,
          # replace this line with:
          #   anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # and set a monthly spend limit in the Anthropic console.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 60 turns + read-only diff tools so review-sized asks fit: at 20
          # turns with no diff access, PR-review requests burned turns on
          # permission denials and died on error_max_turns (runs 29136350689,
          # 29147803092). The pnpm entries make the pre-provisioned toolchain
          # above actually usable (tests/lint/build — same list as
          # claude-review.yml, plus install since no workflow step installs
          # deps here). No node/Edit/Write additions: the write surface is
          # unchanged.
          claude_args: |
            --max-turns 60
            --model claude-sonnet-5
            --allowedTools "Bash(git diff:*),Bash(git log:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(pnpm install:*),Bash(pnpm run:*),Bash(pnpm test:*),Bash(pnpm exec:*),Bash(pnpm --filter:*)"
